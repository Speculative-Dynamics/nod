name: Deploy website to Pages

# Deploys /website as the GitHub Pages site for usenod.app.
# Triggers on pushes to main that touch /website or this workflow,
# and can also be run manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Only one deployment at a time, latest wins.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload website/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
