# XcodeGen input. Regenerate Nod.xcodeproj with:
#   cd ios && xcodegen generate
#
# The generated .xcodeproj is committed to the repo so first-clone works
# without additional tooling. Regenerate after changing this file.

name: Nod

options:
  bundleIdPrefix: app.usenod
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    # Automatic signing with the Nod Apple Developer team pinned.
    # Team ID matches the existing App ID registered at
    # app.usenod.nod (see developer.apple.com/account/resources/identifiers).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Z8AYP4GMZ5

targets:
  Nod:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Nod
        excludes:
          - "Info.plist"
      # Prompts live at the repo root (../prompts/) — single source of truth
      # for LLM prompts across iOS and any future platforms (web, android).
      # Files copied into the iOS app bundle as resources at build time.
      - path: ../prompts
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.usenod.nod
        PRODUCT_NAME: Nod
        INFOPLIST_FILE: Nod/Info.plist
        TARGETED_DEVICE_FAMILY: "1"                    # iPhone only
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: NodAccent
        DEVELOPMENT_ASSET_PATHS: "\"Nod/Preview Content\""
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
